name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Run ESLint
        run: npx next lint --quiet
      # Type check is skipped for now - next lint covers syntax errors
      # and tsc --noEmit requires all env vars to be set
      # Uncomment when ready: - run: npx tsc --noEmit

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    env:
      ENCRYPTION_KEY: ci-test-key-at-least-32-characters-long
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Run unit tests
        run: npx jest --config ./jest.config.cjs --ci --coverage --forceExit
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/

  build-check:
    name: Build Check
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    env:
      NODE_OPTIONS: --max-old-space-size=4096
      OPENAI_API_KEY: dummy-key-for-build
      STRIPE_CLIENT_SECRET: sk_test_dummy_key_for_build
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run build
